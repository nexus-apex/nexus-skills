{% extends "base.html" %}
{% block title %}{% if editing %}Edit{% else %}New{% endif %} Assessment | NexusSkills{% endblock %}
{% block page_title %}{% if editing %}Edit Assessment{% else %}New Assessment{% endif %}{% endblock %}
{% block content %}
<div class="card" style="max-width:750px">
  <form method="post">
    {% csrf_token %}
    <div class="form-row">
      <div class="form-group">
        <label>Title</label>
        <input type="text" name="title" value="{{ record.title|default:'' }}">
      </div>
      <div class="form-group">
        <label>Category</label>
        <select name="category">
          <option value="technical" {% if record.category == 'technical' %}selected{% endif %}>Technical</option>
          <option value="aptitude" {% if record.category == 'aptitude' %}selected{% endif %}>Aptitude</option>
          <option value="personality" {% if record.category == 'personality' %}selected{% endif %}>Personality</option>
          <option value="language" {% if record.category == 'language' %}selected{% endif %}>Language</option>
          <option value="domain" {% if record.category == 'domain' %}selected{% endif %}>Domain</option>
        </select>
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Duration Mins</label>
        <input type="number" name="duration_mins" value="{{ record.duration_mins|default:'0' }}">
      </div>
      <div class="form-group">
        <label>Questions Count</label>
        <input type="number" name="questions_count" value="{{ record.questions_count|default:'0' }}">
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Status</label>
        <select name="status">
          <option value="draft" {% if record.status == 'draft' %}selected{% endif %}>Draft</option>
          <option value="published" {% if record.status == 'published' %}selected{% endif %}>Published</option>
          <option value="archived" {% if record.status == 'archived' %}selected{% endif %}>Archived</option>
        </select>
      </div>
      <div class="form-group">
        <label>Attempts</label>
        <input type="number" name="attempts" value="{{ record.attempts|default:'0' }}">
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Pass Score</label>
        <input type="number" name="pass_score" value="{{ record.pass_score|default:'0' }}">
      </div>
    </div>
    <div class="form-group">
      <label>Description</label>
      <textarea name="description">{{ record.description|default:'' }}</textarea>
    </div>

    <div style="display:flex;gap:0.75rem;margin-top:1rem">
      <button type="submit" class="btn btn-primary">{% if editing %}Update{% else %}Create{% endif %} Assessment</button>
      <a href="/assessments/" class="btn" style="background:var(--border);color:var(--text)">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
